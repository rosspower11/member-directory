<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Accelerator — Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#1A1A1A;color:#FFF;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  .brand{font-size:13px;letter-spacing:.15em;font-weight:600;color:#9CA3AF;margin-bottom:40px}
  .brand span{color:#6B8FAD}
  h1{font-size:clamp(32px,5vw,56px);font-weight:800;line-height:1.1;text-align:center;margin-bottom:16px}
  p{font-size:18px;color:#9CA3AF;text-align:center;max-width:500px;line-height:1.6;margin-bottom:48px}
  .links{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
  a{display:flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;background:#2A2A2A;border:1px solid #333;color:#FFF;text-decoration:none;font-size:15px;font-weight:600;transition:all .2s}
  a:hover{border-color:#6B8FAD;transform:translateY(-2px);box-shadow:0 8px 30px rgba(107,143,173,.15)}
  .arrow{color:#6B8FAD;font-size:18px}
  .pill{position:fixed;top:24px;right:24px;font-size:11px;letter-spacing:.12em;font-weight:600;color:#6B8FAD;background:rgba(107,143,173,.2);padding:4px 12px;border-radius:999px}
</style>
</head>
<body>
  <div class="pill">COHORT 1.0</div>
  <div class="brand">ai powered <span>x</span> claude</div>
  <h1>Claude Accelerator</h1>
  <p>Your home for the 6-week programme. Everything you need to master Claude, all in one place.</p>
  <div class="links">
    <a href="/member-directory">Member Directory <span class="arrow">&rarr;</span></a>
  </div>
</body>
</html>
