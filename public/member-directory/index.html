<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --dark-bg:#1A1A1A;--card-dark:#2A2A2A;--border:#333;
    --steel:#6B8FAD;--steel20:rgba(107,143,173,.2);
    --body:#9CA3AF;--white:#FFF;
    --green:#10B981;--purple:#8B5CF6;--orange:#F59E0B;
    --pink:#EC4899;--red:#EF4444;
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--dark-bg);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* NAV */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,26,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
  .nav-brand{font-size:13px;letter-spacing:.15em;font-weight:600;color:var(--body)}
  .nav-brand span{color:var(--steel)}
  .nav-pill{font-size:11px;letter-spacing:.12em;font-weight:600;color:var(--steel);background:var(--steel20);padding:4px 12px;border-radius:999px}

  /* HERO */
  .hero{padding:100px 24px 40px;max-width:1200px;margin:0 auto;position:relative}
  .hero::before{content:'';position:absolute;top:0;left:0;right:0;height:300px;background:linear-gradient(135deg,rgba(107,143,173,.08),transparent 60%);pointer-events:none}
  .hero-label{font-size:11px;letter-spacing:.2em;font-weight:700;color:var(--steel);margin-bottom:12px;position:relative}
  .hero h1{font-size:clamp(28px,4vw,40px);font-weight:800;line-height:1.15;margin-bottom:8px;position:relative}
  .hero p{font-size:16px;color:var(--body);max-width:600px;line-height:1.6;position:relative}
  .hero-stats{display:flex;gap:24px;margin-top:24px;position:relative}
  .stat{display:flex;align-items:center;gap:8px}
  .stat-num{font-size:24px;font-weight:800;color:var(--steel)}
  .stat-label{font-size:11px;letter-spacing:.1em;color:var(--body);text-transform:uppercase}

  /* GRID */
  .grid-wrap{max-width:1200px;margin:0 auto;padding:0 24px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

  /* CARD */
  .card{background:var(--card-dark);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s ease}
  .card:hover{border-color:var(--steel);transform:translateY(-4px);box-shadow:0 12px 40px rgba(107,143,173,.15)}
  .card-top{height:6px;background:linear-gradient(90deg,var(--steel),transparent)}
  .card-body{padding:24px}
  .card-hdr{display:flex;align-items:center;gap:16px;margin-bottom:16px}
  .avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;background:var(--border)}
  .card-name{font-size:18px;font-weight:700;line-height:1.2}
  .card-role{font-size:12px;color:var(--body);margin-top:2px;line-height:1.4}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .badge{font-size:10px;letter-spacing:.08em;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .b-journey{background:var(--steel20);color:var(--steel)}
  .b-bg{background:rgba(139,92,246,.15);color:var(--purple)}
  .card-intro{font-size:13px;color:var(--body);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .dots{display:flex;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;opacity:.7}
  .card-arrow{font-size:14px;color:var(--steel);transition:transform .2s}
  .card:hover .card-arrow{transform:translateX(4px)}

  /* MODAL */
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
  .overlay.open{display:flex}
  .modal{background:var(--dark-bg);border:1px solid var(--border);border-radius:20px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .3s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-x{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:var(--card-dark);border:1px solid var(--border);color:var(--body);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .2s;line-height:1}
  .modal-x:hover{color:var(--white);border-color:var(--steel)}
  .m-hero{padding:40px 40px 24px;border-bottom:1px solid var(--border);position:relative}
  .m-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(135deg,rgba(107,143,173,.12),transparent 60%);border-radius:20px 20px 0 0;pointer-events:none}
  .m-row{display:flex;align-items:center;gap:20px;position:relative}
  .m-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--steel);background:var(--border)}
  .m-name{font-size:28px;font-weight:800;line-height:1.15}
  .m-industry{font-size:14px;color:var(--body);margin-top:4px}
  .m-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;position:relative}
  .m-badge{font-size:11px;letter-spacing:.06em;font-weight:600;padding:4px 14px;border-radius:999px}
  .m-sec{padding:24px 40px;border-bottom:1px solid var(--border)}
  .m-sec:last-child{border-bottom:none;padding-bottom:40px}
  .m-label{font-size:11px;letter-spacing:.18em;font-weight:700;color:var(--steel);margin-bottom:12px}
  .m-sec p{font-size:14px;color:var(--body);line-height:1.7}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{font-size:11px;font-weight:600;padding:5px 14px;border-radius:8px;background:rgba(255,255,255,.05);color:var(--body)}
  .exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .exp{font-size:11px;font-weight:600;text-align:center;padding:8px 10px;border-radius:8px;background:var(--card-dark);border:1px solid var(--border);color:var(--body)}
  .exp.on{background:var(--steel20);border-color:var(--steel);color:var(--steel)}
  .socials{display:flex;gap:10px;flex-wrap:wrap}
  .soc-link{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;background:var(--card-dark);border:1px solid var(--border);color:var(--body);text-decoration:none;font-size:13px;font-weight:500;transition:all .2s}
  .soc-link:hover{border-color:var(--steel);color:var(--steel)}
  .soc-icon{font-size:11px;font-weight:700;width:24px;height:24px;border-radius:6px;background:var(--steel20);color:var(--steel);display:flex;align-items:center;justify-content:center}
  .modal::-webkit-scrollbar{width:6px}
  .modal::-webkit-scrollbar-track{background:transparent}
  .modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  @media(max-width:640px){
    .grid{grid-template-columns:1fr}
    .m-hero,.m-sec{padding-left:24px;padding-right:24px}
    .m-name{font-size:22px}.m-avatar{width:64px;height:64px}
    .hero-stats{flex-direction:column;gap:12px}
  }
</style>

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trunc(s,n){return s.length>n?s.slice(0,n)+'...':s}
function getSentences(t,n){var m=t.match(/[^.!?]+[.!?]+/g);if(!m)return t;return m.slice(0,n).join(' ').trim()}

  M.forEach(function(m,i){

      var c=GOAL_COLORS[gl]||'#6B8FAD';
      dots+='<div class="dot" title="'+esc(gl)+'" style="background:'+c+'"></div>';
    });
    g.innerHTML+=
      '<div class="card" onclick="openModal('+i+')">'+
        '<div class="card-top"></div>'+
        '<div class="card-body">'+
          '<div class="card-hdr">'+
            '<img class="avatar" src="'+esc(m.photo)+'" alt="'+esc(m.name)+'" loading="lazy">'+
            '<div><div class="card-name">'+esc(m.name)+'</div>'+
            '<div class="card-role">'+esc(m.industry)+'</div></div>'+
          '</div>'+
          '<div class="badges">'+
            '<span class="badge b-journey">'+esc(m.journey.toUpperCase())+'</span>'+
            '<span class="badge b-bg">'+esc(m.background.toUpperCase())+'</span>'+
          '</div>'+
          '<div class="card-intro">'+esc(getSentences(m.intro,2))+'</div>'+
        '</div>'+
        '<div class="card-ft">'+
          '<div class="dots">'+dots+'</div>'+
          '<span class="card-arrow">\u2192</span>'+
        '</div>'+

  if(m.linkedin){var u=m.linkedin.startsWith('http')?m.linkedin:'https://'+m.linkedin;socials.push({icon:'Li',label:'LinkedIn',url:u})}
  if(m.instagram){var h=m.instagram.replace(/^@/,'').replace(/\/$/,'');var u2=m.instagram.startsWith('http')?m.instagram:'https://instagram.com/'+h;socials.push({icon:'Ig',label:'@'+h,url:u2})}
  if(m.x){socials.push({icon:'X',label:m.x,url:'https://x.com/'+m.x.replace('@','')})}
  if(m.website){var u3=m.website.startsWith('http')?m.website:'https://'+m.website;socials.push({icon:'W',label:m.website.replace(/^https?:\/\//,'').replace(/\/$/,''),url:u3})}

  var goalTags='';
  m.goals.forEach(function(gl){
    var c=GOAL_COLORS[gl]||'#6B8FAD';
    goalTags+='<span class="tag" style="background:'+c+'22;color:'+c+'">'+esc(gl)+'</span>';
  });

  var expChips='';
  ALL_EXP.forEach(function(e){
    var on=m.experience.indexOf(e)>=0||m.experience.indexOf('Never Used')>=0&&false;
    if(m.experience.indexOf(e)>=0) on=true;
    expChips+='<div class="exp'+(on?' on':'')+'">'+esc(e)+'</div>';
  });

  var challengeTags='';
  m.challenges.forEach(function(c2){challengeTags+='<span class="tag">'+esc(c2)+'</span>'});

  var socialLinks='';
  socials.forEach(function(s){
    socialLinks+='<a class="soc-link" href="'+esc(s.url)+'" target="_blank" rel="noopener noreferrer"><span class="soc-icon">'+esc(s.icon)+'</span>'+esc(s.label)+'</a>';
  });

  md.innerHTML=
    '<button class="modal-x" onclick="closeModal()">\u00d7</button>'+
    '<div class="m-hero">'+
      '<div class="m-row">'+
        '<img class="m-avatar" src="'+esc(m.photo)+'" alt="'+esc(m.name)+'">'+
        '<div><div class="m-name">'+esc(m.name)+'</div>'+
        '<div class="m-industry">'+esc(m.industry)+'</div></div>'+
      '</div>'+
      '<div class="m-badges">'+
        '<span class="m-badge b-journey">'+esc(m.journey.toUpperCase())+'</span>'+
        '<span class="m-badge b-bg">'+esc(m.background.toUpperCase())+'</span>'+
      '</div>'+
    '</div>'+

    '<div class="m-sec"><div class="m-label">ABOUT</div><p>'+esc(m.intro)+'</p></div>'+
    '<div class="m-sec"><div class="m-label">WHAT SUCCESS LOOKS LIKE</div><p>'+esc(m.success)+'</p></div>'+
    '<div class="m-sec"><div class="m-label">GOALS</div><div class="tags">'+goalTags+'</div></div>'+
    '<div class="m-sec"><div class="m-label">CLAUDE EXPERIENCE</div><div class="exp-grid">'+expChips+'</div></div>'+
    '<div class="m-sec"><div class="m-label">BIGGEST CHALLENGES</div><div class="tags">'+challengeTags+'</div></div>'+
    '<div class="m-sec"><div class="m-label">LOOKING TO CONNECT WITH</div><p>'+esc(m.connect)+'</p></div>'+
    (m.fun?'<div class="m-sec"><div class="m-label">OUTSIDE OF WORK</div><p>'+esc(m.fun)+'</p></div>':'')+
    (socials.length?'<div class="m-sec"><div class="m-label">CONNECT</div><div class="socials">'+socialLinks+'</div></div>':'');

  o.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

renderCards();
</script>
</body>
</html>
